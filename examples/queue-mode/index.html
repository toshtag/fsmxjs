<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue mode — fsmxjs examples</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    p { color: #555; font-size: 0.9rem; }
    button { padding: 0.5rem 1.25rem; font-size: 1rem; cursor: pointer; }
    #log { margin-top: 1rem; border: 1px solid #ddd; border-radius: 4px; padding: 0.75rem 1rem; min-height: 6rem; font-family: monospace; font-size: 0.85rem; background: #fafafa; }
    .entry { margin: 0.15rem 0; }
    .entry.transition { color: #0969da; }
    a { font-size: 0.875rem; color: #0969da; }
  </style>
</head>
<body>
  <a href="../">← back</a>
  <h1>Queue mode</h1>
  <p>
    A subscriber sends a chained event back to the service during a transition.
    With <code>queue: true</code>, the chained send is safely enqueued rather than dropped or causing re-entrant issues.
  </p>
  <button id="trigger">Send TRIGGER</button>
  <button id="clear">Clear log</button>
  <div id="log"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
