<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Async search — fsmxjs examples</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    p { color: #555; font-size: 0.9rem; }
    input { width: 100%; box-sizing: border-box; padding: 0.5rem; font-size: 1rem; }
    .status { margin-top: 0.5rem; font-size: 0.875rem; color: #888; min-height: 1.2em; }
    ul { padding-left: 1.25rem; margin-top: 0.75rem; }
    li { margin: 0.25rem 0; }
    a { font-size: 0.875rem; color: #0969da; }
  </style>
</head>
<body>
  <a href="../">← back</a>
  <h1>Async search</h1>
  <p>
    Each keystroke triggers an async search. <code>takeLatest</code> automatically cancels the previous
    in-flight request so stale results never appear.
  </p>
  <input id="query" type="text" placeholder="Type to search fruits…" />
  <div class="status" id="status"></div>
  <ul id="results"></ul>
  <script type="module" src="./main.ts"></script>
</body>
</html>
